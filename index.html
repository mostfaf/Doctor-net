<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكتور نت - حلول الشبكات المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3a0ca3;
            --secondary: #4361ee;
            --accent: #4cc9f0;
            --success: #2ecc71;
            --warning: #f9c74f;
            --danger: #e63946;
            --light: #f8f9fa;
            --dark: #1d3557;
            --text: #333;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        body { background: linear-gradient(135deg, #1a237e 0%, var(--primary) 50%, #4cc9f0 100%); color: var(--text); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2); overflow: hidden; }
        
        .header { background: linear-gradient(90deg, var(--primary), var(--secondary)); padding: 40px; text-align: center; }
        
        .doctor-net-logo h1 { color: white; font-size: 3.5rem; font-weight: 900; letter-spacing: 2px; }
        .doctor-net-logo p { color: rgba(255, 255, 255, 0.9); font-size: 1.4rem; }
        
        .main-content { padding: 40px 30px; }

        /* تنسيق شركاء النجاح */
        .partners-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        
        .partner-badge { background: white; border: 1px solid rgba(67, 97, 238, 0.15); padding: 12px 20px; border-radius: 10px; font-weight: 700; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }

        .partner-badge:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(67, 97, 238, 0.2); }
        
        .section-title { color: var(--primary); font-size: 2rem; margin: 30px 0; text-align: center; font-weight: 800; position: relative; }
        
        .social-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        
        .social-btn { display: flex; align-items: center; gap: 10px; color: white; font-weight: 700; padding: 15px 30px; border-radius: 50px; text-decoration: none; transition: 0.3s; }
        .social-btn.wa { background: #25d366; }
        .social-btn.fb { background: #3a0ca3; }
        
        .form-container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); margin-bottom: 30px; }
        .form-input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; margin-bottom: 15px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
        
        .footer { background: var(--dark); color: white; text-align: center; padding: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="doctor-net-logo">
                <h1>DOCTOR NET</h1>
                <p>حلول الشبكات المتكاملة</p>
            </div>
        </header>
        
        <div class="main-content">
            <div class="partners-container">
                <a href="https://www.smart-radius.com" target="_blank" class="partner-badge" style="background: linear-gradient(45deg, #3a0ca3, #4361ee); color: white; border: none;">
                    <i class="fas fa-crown" style="color: gold;"></i> برعاية سمارت راديوس - الأفضل في الشرق الأوسط
                </a>
                <div class="partner-badge"><i class="fas fa-star"></i> إمبراطورية أبويوسف عطا</div>
                <div class="partner-badge"><i class="fas fa-star"></i> إمبراطورية باسم LG</div>
                <div class="partner-badge"><i class="fas fa-star"></i> شركة أبوكمال</div>
            </div>

            <div class="social-container">
                <a href="https://wa.me/201064496440" class="social-btn wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                <a href="https://www.facebook.com/share/1RzaRwfF5Y/" class="social-btn fb"><i class="fab fa-facebook"></i> فيسبوك</a>
            </div>
            
            <h2 class="section-title">حجز طلب دعم فني</h2>
            <div class="form-container">
                <form id="ticket-form">
                    <input type="text" id="name" class="form-input" placeholder="الاسم الكامل" required>
                    <input type="tel" id="phone" class="form-input" placeholder="رقم الهاتف" required>
                    <textarea id="desc" class="form-input" placeholder="وصف المشكلة" required></textarea>
                    <button type="submit" class="submit-btn">إرسال الطلب</button>
                </form>
                <div id="ticket-status" style="margin-top:15px; text-align:center;"></div>
            </div>
            
            <div id="admin-panel" style="display: none;" class="form-container">
                <h2 class="section-title">لوحة الإدارة</h2>
                <table class="admin-table" id="admin-table">
                    <thead><tr><th>الاسم</th><th>الطلب</th><th>الحالة</th></tr></thead>
                    <tbody id="admin-tbody"></tbody>
                </table>
            </div>

            <div id="admin-login-form" class="form-container">
                <h2 class="section-title">دخول الإدارة</h2>
                <input type="password" id="admin-password" class="form-input" placeholder="كلمة المرور">
                <button id="admin-login-btn" class="submit-btn">دخول</button>
            </div>
        </div>
        
        <footer class="footer">
            <p>حقوق النشر © مصطفى عاطف الشورى - برعاية سمارت راديوس</p>
        </footer>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBc8_zLnXtj9SoypTUUD4df8aCL1Jus3gU",
            authDomain: "doctor-net-e72eb.firebaseapp.com",
            projectId: "doctor-net-e72eb",
            storageBucket: "doctor-net-e72eb.appspot.com",
            messagingSenderId: "564197492244",
            appId: "1:564197492244:web:a901c2dac343aa5a268901"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // منطق حجز الطلب
        document.getElementById("ticket-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const desc = document.getElementById("desc").value;
            await db.collection("tickets").add({ name, phone, desc, status: "جديد", createdAt: new Date() });
            alert("تم الحجز بنجاح!");
            document.getElementById("ticket-form").reset();
        });

        // منطق الإدارة
        document.getElementById("admin-login-btn").addEventListener("click", () => {
            if (document.getElementById("admin-password").value === "doctor123") {
                document.getElementById("admin-panel").style.display = "block";
                document.getElementById("admin-login-form").style.display = "none";
                loadTickets();
            } else {
                alert("كلمة المرور خطأ!");
            }
        });

        async function loadTickets() {
            const snapshot = await db.collection("tickets").get();
            const tbody = document.getElementById("admin-tbody");
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                tbody.innerHTML += `<tr><td>${data.name}</td><td>${data.desc}</td><td>${data.status}</td></tr>`;
            });
        }
    </script>
</body>
</html>
